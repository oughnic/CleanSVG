name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: CleanSVG-win-x64.exe
          - os: ubuntu-latest
            rid: linux-x64
            artifact: CleanSVG-linux-x64
          - os: macos-latest
            rid: osx-x64
            artifact: CleanSVG-osx-x64
          - os: macos-latest
            rid: osx-arm64
            artifact: CleanSVG-osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        run: dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -o publish

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: mv publish/CleanSVG.exe publish/${{ matrix.artifact }}

      - name: Rename artifact (non-Windows)
        if: runner.os != 'Windows'
        run: mv publish/CleanSVG publish/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
